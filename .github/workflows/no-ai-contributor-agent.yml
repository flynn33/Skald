name: No-AI Contributor Agent

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full_scan:
        description: Scan the full tracked repository instead of only the incoming change set
        required: false
        default: false
        type: boolean
      fix_docs:
        description: Remove AI contributor/tool attributions from docs when the match is unambiguous
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  enforce-no-ai-contributors:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce no AI contributor policy
        shell: bash
        env:
          SHOULD_FIX_DOCS: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.fix_docs) }}
          SHOULD_FULL_SCAN: ${{ github.event_name == 'workflow_dispatch' && inputs.full_scan }}
        run: |
          args=(
            -EventPath "${{ github.event_path }}"
            -EventName "${{ github.event_name }}"
          )

          if [ "$SHOULD_FIX_DOCS" = "true" ]; then
            args+=(-FixDocs)
          fi

          if [ "$SHOULD_FULL_SCAN" = "true" ]; then
            args+=(-FullScan)
          fi

          pwsh -NoLogo -NoProfile -File scripts/github/Test-NoAIContributors.ps1 "${args[@]}"

      - name: Commit sanitized docs
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.fix_docs && github.ref == 'refs/heads/main')
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No sanitized documentation changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: remove AI contributor references [skip ci]"
          git push
